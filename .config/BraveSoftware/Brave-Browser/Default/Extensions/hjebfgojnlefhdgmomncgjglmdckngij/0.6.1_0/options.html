<!doctype html>
<html>
<head>
	<title>SuperSorter options</title>
	<!-- Note: Because my deployment script sucks a bit, the two comments below need to be on the same line: -->
 <script type="text/javascript" src="ss.js"></script> 
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet" />
	<link rel="stylesheet" type="text/css" href="styles.css" />
	<link rel="stylesheet" type="text/css" href="switch.css" />
</head>
<body id="options-body">
	<div style="display: none;" id="thisIsTheOptionsPage"></div>
	<div id="options-page-container">
		<div id="options-select">
			<h1>
				<img src="go-jump-32.png" width="32" height="32" alt="SuperSorter icon" />&nbsp;SuperSorter options
			</h1>
			<!-- <p>
				<label for="sortorder">Bookmark sort order:</label> <select id="sortorder">
					<option id="sortorder_option_ascending" value="ascending" selected>Ascending</option>
					<option id="sortorder_option_descending" value="descending">Descending</option>
				</select>
			</p> -->
			<div>
				<div class="options-panel">
					<!-- <h3>Sorting</h3> -->
					<div class="option-row"><label class="input-toggle">
							<input type="checkbox" id="autoSort">
							<span></span>
						</label><label for="autoSort" class="option-label">Sort automatically (no need to click the
							button)</label></div>
					<div class="option-row"><label class="input-toggle">
							<input type="checkbox" id="reverseSort">
							<span></span>
						</label><label for="reverseSort" class="option-label">Reverse sort order</label></div>
					<div class="option-row"><label class="input-toggle">
							<input type="checkbox" id="foldersFirst">
							<span></span>
						</label><label for="foldersFirst" class="option-label">Put folders before bookmarks</label>
					</div>
					<div class="option-row"><label class="input-toggle">
							<input type="checkbox" id="deleteEmptyFolders">
							<span></span>
						</label><label for="deleteEmptyFolders" class="option-label">Delete empty folders</label></div>
					<div class="option-row"><label class="input-toggle">
							<input type="checkbox" id="mergeNeighbours">
							<span></span>
						</label><label for="mergeNeighbours" class="option-label">Merge neighbouring folders that have
							the
							same
							name</label></div>
					<div class="option-row"><label class="input-toggle">
							<input type="checkbox" id="deDupeLocal">
							<span></span>
						</label><label for="deDupeLocal" class="option-label">Delete duplicates within the same
							folder when sorting</label></div>
					<div class="option-row"><label class="input-toggle">
							<input type="checkbox" id="caseSensitive">
							<span></span>
						</label><label for="caseSensitive" class="option-label">Use case-sensitive name
							comparisons</label></div>
					<div class="option-row"><label class="input-toggle">
							<input type="checkbox" id="ignoreBookmarksBar">
							<span></span>
						</label><label for="ignoreBookmarksBar" class="option-label">Ignore Bookmarks
							Bar</label></div>
					<div class="option-row"><label class="input-toggle">
							<input type="checkbox" id="cancelIfBmManagerActive">
							<span></span>
						</label><label for="cancelIfBmManagerActive" class="option-label">Don't start sorting if
							Bookmark Manager is active</label></div>
					<!-- 	</div>
			</div>
			<div>
				<div class="options-panel"> -->
					<!-- 	<h3>Removing duplicates</h3> -->
					<div class="option-row"><label class="input-toggle">
							<input type="checkbox" id="httpHttpsEquivalent">
							<span></span>
						</label><label for="httpHttpsEquivalent" class="option-label">Treat HTTP and HTTPS as
							equivalent when comparing bookmarks</label>
					</div>
					<div class="option-row"><label class="input-toggle">
							<input type="checkbox" id="ignoreTitles">
							<span></span>
						</label><label for="ignoreTitles" class="option-label">Identify duplicates by URL only (ignore
							titles)</label>
					</div>
				</div>
			</div>
			<p>
				<!-- <button id="ss-options-save" title="Save these settings.">Save options</button>
				&nbsp; -->
				<button id="ss-options-restore-defaults" class="ss-button"
					title="Set all options back to their initial state and save them.">Restore
					defaults</button>
				&nbsp; <span id="status"></span>
			</p>
			<p>During regular sorting, only duplicates in the same folder are identified and removed (if this option is
				selected above). To find and remove
				duplicates everywhere, use the button below.</p>
			<p>
				<button id="ss-dedupe-global" class="ss-button"
					title="Search the whole bookmarks tree for duplicates and display them below.">Find
					all duplicates now</button>
				&nbsp;<span class="dedupe-spinner-container" style="display:none;"><img src="loader_yellow_on_blue.gif"
						alt="Animation" />&nbsp;Working... </span>
			</p>
		</div>
		<div id="dupeDisplay" style="display:none;">
			<h2>Duplicate bookmarks</h2>
			<div id="deDupeButtons">
				<button id="ss-select-all-but-first-in-each-group" class="ss-dup-button"
					title="Select all items except the first in each group of duplicates.">
					Select all but first</button>
				<button id="ss-select-all-but-last-in-each-group" class="ss-dup-button"
					title="Select all items except the last in each group of duplicates.">
					Select all but last</button>
				<button id="ss-invert-selection" class="ss-dup-button"
					title="Deselect everything that is currently selected, and select everything that is not currently selected.">Invert
					selection</button>
				<button id="ss-deselect-all" class="ss-dup-button" title="Clear selection.">Clear
					selection</button>
				<button id="ss-refresh-duplicates" class="ss-dup-button"
					title="Refresh the list, clearing all selections.">Refresh +
					deselect</button>
				<button id="ss-global-dedupe" class="ss-dup-button" title="Delete all checked items.">Delete
					selected</button>
				<span id="confirmCancelButtons">
					<button id="ss-dedupe-confirm" class="ss-button-confirm" title="Delete them now!">Confirm</button>
					<button id="ss-dedupe-cancel" class="ss-button-cancel" title="Don't delete.">Cancel</button> </span>
				<button id="ss-dedupe-hide" class="ss-dup-button" title="Hide the duplicates display.">Close</button>
			</div>
			<div class="dedupe-spinner-container"><img src="loader_yellow_on_blue.gif"
					alt="Animation" />&nbsp;Working... </div>
			<div class="duplicateListDiv" id="globalDuplicateList">
			</div>
		</div>
	</div>
	<script type="text/javascript" src="jquery-3.4.1.min.js"></script>
	<script type="text/javascript" src="optionsStarter.js"></script>
</body>
</html>
