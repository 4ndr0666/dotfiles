# --- // Vapoursynth:
I vf toggle vapoursynth=~/motioninterpolation.vpy
I vf toggle format=yuv420p,vapoursynth=~~/motioninterpolation.vpy:4:4

# --- // Anime4k:
#ALT+b change-list glsl-shaders toggle "/usr/share/anime4k/Anime4K_Upscale_CNN_x2_L.glsl"; change-list glsl-shaders toggle "/usr/share/anime4k/Anime4K_Restore_CNN_S.glsl"



# --- // Keybindings:
s                screenshot
shift+s         screenshot each-frame
#Shift+UP        seek  600
#Shift+DOWN      seek -600
#=               cycle video-unscaled
#-               cycle-values window-scale 2 3 1 .5
WHEEL_UP        add video-zoom 0.25
WHEEL_DOWN      add video-zoom -0.25
#WHEEL_LEFT      ignore
#WHEEL_RIGHT     ignore
=               add video-rotate 90
-               add video-rotate -90
#Alt+RIGHT       add video-rotate 90
#Alt+LEFT        add video-rotate -90
