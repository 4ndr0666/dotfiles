- defaults:
    link:
        relink: true

- clean: ['~']

- link:
    ~/.profile: profile
    ~/.bash_profile: bash_profile
    ~/.bashrc: bashrc
    ~/.gitconfig: gitconfig
    ~/.ssh/config:
        path: ssh/config
        create: true
    ~/.zshrc: zshrc
    ~/.xinitrc: xinitrc

- create:
    - ~/Downloads
    - ~/.vim

- shell:
    - [git submodule update --init --recursive, Installing submodules]
