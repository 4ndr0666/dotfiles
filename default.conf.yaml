- defaults:
    link:
        create: true
        relink: true

- clean: ['~', '~/.config']

- link:
    ~/.dotfiles: ''
    ~/.vim: vim
    ~/.init.vim:
      relink: true
      path: vim/init.vim
    ~/.zshrc:
      force: true
      path: zshrc
    ~/.profile: profile
    ~/.bash_profile: bash_profile
    ~/.bashrc: bashrc
    ~/.gitconfig: gitconfig
    ~/.gnupg/gpg.conf:
    ~/.ssh/config:
        path: ssh/config
        create: true
    ~/.screenrc:
    ~/.shell:
    ~/.xinitrc: xinitrc
    ~/.config/alacritty:
      create: true
      path: config/alacritty
    ~/.haskeline:
    ~/.hgrc:
    ~/.inputrc:
    ~/.pythonrc:
    ~/.tmux.conf:
    ~/.vimrc:
    ~/.config/backupmenu
      create: true
      path: config/backupmenu
    ~/.config/bat
      create: true
      path: config/bat
    ~/.config/bleachbit
