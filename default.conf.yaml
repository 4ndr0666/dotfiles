- create:
    - ~/.ssh:
      mode: 0700
    - ~/Projects:
    - ~/Downloads
    - ~/.vim/autoload
    - ~/.vim/colors
    - ~/.vim/plugged
    - ~/.cht.sh
    - ~/.bashhub

- shell:
  - git submodule sync --recursive
 # the following have to run after linking ~/.gitconfig
  - git update-submodules
  - >
    git cleanall -f
    irssi/scripts/vendor/
    shell/plugins/
    vim/pack/vendor/start/
    zsh/plugins/
